<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap');

.mm-404 {
  --rosso:      #8a2432;
  --terracotta: #a9483d;
  --grano:      #ddc9a2;
  --nero:       #1a1410;
  --bianco:     #f5f2ec;
  --font-d: 'Bebas Neue', sans-serif;
  --font-s: 'Cormorant Garamond', serif;
  --font-b: 'DM Sans', sans-serif;

  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 80px 40px 64px;
  overflow: hidden;
  font-family: var(--font-b);
  color: var(--nero);
}

.mm-404::before {
  content: '';
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 60% 40% at 15% 80%, rgba(221,201,162,.22) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 85% 20%, rgba(221,201,162,.15) 0%, transparent 70%);
}

.mm-404 * { box-sizing: border-box; }

/* flour puffs */
.mm-404 .fp {
  position: absolute; border-radius: 50%;
  background: rgba(221,201,162,.35);
  filter: blur(18px); pointer-events: none;
  animation: mm404-float 6s ease-in-out infinite;
}
.mm-404 .fp:nth-child(1) { width:80px; height:80px; top:22%; left:8%;  animation-delay:0s;   }
.mm-404 .fp:nth-child(2) { width:50px; height:50px; top:65%; left:18%; animation-delay:1.5s; }
.mm-404 .fp:nth-child(3) { width:65px; height:65px; top:18%; right:10%;animation-delay:.8s;  }
.mm-404 .fp:nth-child(4) { width:40px; height:40px; top:55%; right:16%;animation-delay:2.2s; }
.mm-404 .fp:nth-child(5) { width:30px; height:30px; top:78%; left:48%; animation-delay:3s;   }

@keyframes mm404-float {
  0%,100% { transform: translateY(0)    scale(1);   opacity: .5; }
  50%      { transform: translateY(-14px) scale(1.1); opacity: .9; }
}

/* 404 row */
.mm-404 .mm-row {
  position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: center;
  gap: clamp(10px, 3vw, 36px);
  margin-bottom: 8px;
  animation: mm404-up .7s ease both;
}

.mm-404 .mm-digit {
  font-family: var(--font-d);
  font-size: clamp(130px, 20vw, 280px);
  line-height: 0.9;
  color: var(--rosso);
  letter-spacing: .02em;
  user-select: none;
}

/* panetto */
.mm-404 .mm-ball {
  display: flex; align-items: center; justify-content: center;
  width: clamp(100px, 16vw, 215px);
  height: clamp(100px, 16vw, 215px);
  flex-shrink: 0; position: relative; top: -4px;
  animation: mm404-bounce 2.4s cubic-bezier(.36,.07,.19,.97) infinite;
}
@keyframes mm404-bounce {
  0%,100% { transform: translateY(0)    scaleX(1)    scaleY(1);    }
  18%      { transform: translateY(-14%) scaleX(.95)  scaleY(1.05); }
  36%      { transform: translateY(0)    scaleX(1.06) scaleY(.94);  }
  54%      { transform: translateY(-7%)  scaleX(.98)  scaleY(1.02); }
  72%      { transform: translateY(0)    scaleX(1.02) scaleY(.99);  }
}
.mm-404 .mm-ball svg {
  width: 100%; height: 100%;
  filter: drop-shadow(0 12px 28px rgba(26,20,16,.18)) drop-shadow(0 4px 8px rgba(26,20,16,.10));
}

/* text */
.mm-404 .mm-body {
  position: relative; z-index: 1;
  animation: mm404-up .7s .15s ease both;
}
.mm-404 .mm-divider {
  display: inline-block; width: 48px; height: 1px;
  background: var(--terracotta); margin-bottom: 20px;
}
.mm-404 .mm-label {
  font-family: var(--font-b); font-size: 11px;
  letter-spacing: .28em; text-transform: uppercase;
  color: var(--terracotta); display: block; margin-bottom: 16px;
}
.mm-404 .mm-title {
  font-family: var(--font-s);
  font-size: clamp(20px, 2.6vw, 30px);
  font-weight: 300; font-style: italic;
  color: var(--nero); line-height: 1.45;
  max-width: 500px; margin: 0 auto 10px;
}
.mm-404 .mm-sub {
  font-size: 13px; font-weight: 300;
  color: rgba(26,20,16,.45); margin-bottom: 36px;
}
.mm-404 .mm-btn {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--font-b); font-size: 11px; font-weight: 500;
  letter-spacing: .22em; text-transform: uppercase; text-decoration: none;
  color: var(--rosso); border-bottom: 1.5px solid var(--rosso);
  padding-bottom: 4px; transition: gap .3s;
}
.mm-404 .mm-btn:hover { gap: 20px; }

.mm-404 .mm-links {
  margin-top: 48px; position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: center;
  gap: 24px; flex-wrap: wrap;
  animation: mm404-up .6s .28s ease both;
}
.mm-404 .mm-links a {
  font-size: 10px; letter-spacing: .2em; text-transform: uppercase;
  color: rgba(26,20,16,.3); text-decoration: none; transition: color .3s;
}
.mm-404 .mm-links a:hover { color: var(--terracotta); }
.mm-404 .mm-links span { color: rgba(26,20,16,.15); font-size: 8px; }

@keyframes mm404-up {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 768px) {
  .mm-404 { padding: 48px 24px 48px; }
  .mm-404 .mm-digit { font-size: clamp(90px, 24vw, 150px); }
}
</style>

<div class="mm-404">

  <div class="fp"></div><div class="fp"></div>

        <ellipse cx="110" cy="38" rx="14" ry="8" fill="#c9a870" opacity=".55" filter="url(#mm404-soft)"/>
        <ellipse cx="110" cy="38" rx="7"  ry="4" fill="#b8935a" opacity=".4"  filter="url(#mm404-soft)"/>

      </svg>
    </div>

    <span class="mm-digit">4</span>
  </div>

  <div class="mm-body">
